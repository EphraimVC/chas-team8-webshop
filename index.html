<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Website</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="./assets/js/script.js" type="module"></script>
</head>

<body>
  <header class="profile-header">
    <img class="logo-img" src="/assets/logo.webp">
    <a> <i class="fa-solid fa-cart-shopping"></i></a>
  </header>

  <main class="main-container">
    <select name="categories" id="filter-select" >
      <option value="all">All products</option>
      <option value="women's clothing" data-category="women's clothing">Women's Clothing</option>
      <option value="men's clothing" data-category="men's clothing">Men's Clothing</option>
      <option value="electronics" data-category="electronics">Electronics</option>
      <option value="jewelery" data-category="jewelery">Jewelery</option>
    </select>

    <select name="sort" id="sort-select" >
      <option value="none">No sort</option>
      <option value="ascending">Price, low to high</option>
      <option value="descending">Price, high to low</option>
    </select>

    <article id="items-container">
    </article>

    <div id="loader" class="hide">
      <img src="./assets/images/spinner.svg" alt="Loading..."/>
    </div>
  </main>

</body>
</html>
